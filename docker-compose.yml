services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: vpn
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - vpn-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn -d vpn"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  xray:
    image: teddysun/xray:latest
    restart: always
    # Не /usr/bin/xray как PID1: см. config/xray/xray-supervisor.sh и «vpn-panel xray-restart».
    entrypoint: ["/bin/sh", "/etc/xray/xray-supervisor.sh"]
    volumes:
      - ./config/xray:/etc/xray
    # ports: см. docker-compose.xray-ports.gen.yml (генерируется из inbounds в config/xray/config.json)
    networks:
      - vpn-net

  panel:
    build: .
    restart: always
    environment:
      API_KEY: ${API_KEY}
      DATABASE_URL: postgres://vpn:${POSTGRES_PASSWORD}@postgres:5432/vpn
      XRAY_API_HOST: xray
      XRAY_API_PORT: "10085"
      XRAY_PROTO_ROOT: /app/xray-core
      PORT: "${PORT:-12983}"
      TRAFFIC_SYNC_INTERVAL_MS: ${TRAFFIC_SYNC_INTERVAL_MS:-60000}
      TLS_CERT: ${TLS_CERT:-}
      TLS_KEY: ${TLS_KEY:-}
    ports:
      - "${PORT:-12983}:${PORT:-12983}"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      postgres:
        condition: service_healthy
      xray:
        condition: service_started
    networks:
      - vpn-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsk https://localhost:${PORT:-12983}/health 2>/dev/null || curl -fs http://localhost:${PORT:-12983}/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  pgdata:

networks:
  vpn-net:
    driver: bridge
