openapi: 3.1.0
info:
  title: Super VPN Panel API
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - ApiKeyAuth: []
paths:
  /health:
    get:
      security: []
      summary: Health check
      responses:
        "200":
          description: OK
  /openapi.yaml:
    get:
      security: []
      summary: OpenAPI YAML
      responses:
        "200":
          description: YAML document
  /openapi.json:
    get:
      security: []
      summary: OpenAPI JSON
      responses:
        "200":
          description: OpenAPI object
  /xray/config:
    get:
      summary: Get Xray config.json (same file as inbounds; read from disk)
      description: |
        Путь: `XRAY_CONFIG_PATH` (в Docker с типовым compose — `/app/config/xray/config.json` при монтировании `config/xray`).
        С `?raw=1` тело ответа — сырой текст файла.
      parameters:
        - name: raw
          in: query
          required: false
          schema:
            type: string
            enum: ["1", "true"]
      responses:
        "200":
          description: JSON object
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Файл не найден
        "500":
          description: Не удалось прочитать или распарсить
    put:
      summary: Replace Xray config.json
      description: |
        Тело — полный JSON-объект (корневой объект, не массив). Запись атомарная. После правок вызовите `POST /xray/reload`.
        Для смены портов inbounds по-прежнему нужен `scripts/run-gen-xray-ports.sh` / `vpn-panel start` (генерация `docker-compose.xray-ports.gen.yml`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, path]
                properties:
                  ok: { const: true }
                  path: { type: string }
        "400":
          description: Не объект или невалидный JSON
        "415":
          description: Content-Type не JSON
        "500":
          description: Ошибка записи
  /xray/reload:
    post:
      summary: Перезагрузить Xray (тот же смысл, что `scripts/vpn-panel xray-restart` / `reload-xray`)
      description: |
        Поведение задаётся окружением:
        - `XRAY_RELOAD_TYPE=compose` — `docker compose exec` в сервис `xray` (и опционально `docker compose restart panel` при `mode=withPanel`), как в `scripts/vpn-panel`. Нужны `XRAY_RELOAD_COMPOSE_DIR`, `COMPOSE_PROJECT_NAME`, compose-файлы, Docker socket с хоста.
        - `XRAY_RELOAD_TYPE=script` — `sh -c` для `XRAY_RELOAD_SCRIPT` (только xray) или `XRAY_RELOAD_WITH_PANEL_COMMAND` (при `withPanel`, аналог `reload-xray`).
        - `XRAY_RELOAD_TYPE=none` — эндпоинт отвечает 503.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [xray, withPanel]
                  default: xray
      parameters:
        - name: mode
          in: query
          required: false
          schema:
            type: string
            enum: [xray, withPanel]
            default: xray
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, mode]
                properties:
                  ok: { const: true }
                  mode: { type: string }
                  output: { type: string, description: "stdout+stderr внешних команд" }
        "502":
          description: Команда перезагрузки завершилась с ошибкой
        "503":
          description: Перезагрузка не настроена или нет обязательных env
  /status:
    get:
      summary: Server and Xray status
      description: |
        Загрузка хоста (CPU за короткое окно, память, load average, корневой диск) и доступность Xray API (`listInbounds`).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [uptimeSec, server, xray]
                properties:
                  uptimeSec:
                    type: integer
                    description: Uptime процесса панели в секундах
                  server:
                    type: object
                    required: [cpu, memory, load, disk]
                    properties:
                      cpu:
                        type: object
                        required: [usagePercent]
                        properties:
                          usagePercent:
                            type: integer
                            minimum: 0
                            maximum: 100
                      memory:
                        type: object
                        required: [totalBytes, freeBytes, usedPercent]
                        properties:
                          totalBytes: { type: integer }
                          freeBytes: { type: integer }
                          usedPercent: { type: integer }
                      load:
                        type: object
                        required: [load1, load5, load15, cores]
                        properties:
                          load1: { type: number }
                          load5: { type: number }
                          load15: { type: number }
                          cores: { type: integer }
                      disk:
                        type: object
                        required: [path, totalBytes, freeBytes, usedPercent]
                        properties:
                          path: { type: string }
                          totalBytes: { type: integer }
                          freeBytes: { type: integer }
                          usedPercent: { type: integer }
                  xray:
                    type: object
                    required: [connected]
                    properties:
                      connected: { type: boolean }
                      inboundCount: { type: integer }
                      error: { type: string }
  /inbounds:
    get:
      summary: List inbound tags from running Xray
      description: |
        Inbounds задаются в `config/xray/config.json` вручную; API только читает теги через gRPC.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    tag:
                      type: string
        "502":
          description: Xray gRPC error
        "503":
          description: Xray not configured
  /inbounds/online:
    get:
      summary: Online users per inbound
      description: |
        Возвращает два счётчика по каждому инбаунду:
        `onlineUsers` — текущий online по Xray (`GetAllOnlineUsers` / `GetUsersStats`);
        `activeUsers` — пользователи с трафиком за последнее окно `activeWindowMs` (как в 3x-ui по смыслу).
        Для `onlineUsers` в **рабочем** `config/xray/config.json` в `policy.levels` для уровня клиентов
        (как правило `"0"`) нужны `statsUserOnline` (и блок `"stats": {}`), см. `config/xray/config.example.json`.
        Если `statsUserOnline` выключен, `onlineUsers` будет 0, но `activeUsers` может быть > 0.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [inbounds, activeWindowMs, unmappedOnlineUsers]
                properties:
                  activeWindowMs:
                    type: integer
                    description: Размер окна активности для `activeUsers` в миллисекундах
                  unmappedOnlineUsers:
                    type: integer
                    description: Онлайн в Xray, но id не найден среди пользователей панели
                  inbounds:
                    type: array
                    items:
                      type: object
                      required: [tag, protocol, onlineUsers, activeUsers]
                      properties:
                        tag:
                          type: string
                        protocol:
                          type: string
                        onlineUsers:
                          type: integer
                        activeUsers:
                          type: integer
        "502":
          description: Xray gRPC error
        "503":
          description: Xray not configured
  /users:
    get:
      summary: List users
      parameters:
        - name: inboundTag
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
    post:
      summary: Create user
      description: |
        `inboundTag` должен совпадать с тегом inbound в уже запущенном Xray.
        VLESS-ссылку собирайте у себя по `uuid`, `inboundTag` и настройкам из своего `config.json`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, inboundTag]
              properties:
                name:
                  type: string
                inboundTag:
                  type: string
                enabled:
                  type: boolean
                  default: true
                  description: Whether user is active in Xray on creation
                expireAt:
                  type: string
                  format: date-time
                  nullable: true
                dataLimit:
                  type: string
                  description: Traffic limit in bytes (stringified bigint)
                  nullable: true
      responses:
        "200":
          description: Created user
        "400":
          description: Validation or unknown inboundTag
  /users/{uuid}:
    get:
      summary: Get user
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: VLESS/VMess/Trojan UUID of the user
      responses:
        "200":
          description: OK
    patch:
      summary: Update user
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: VLESS/VMess/Trojan UUID of the user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                enabled:
                  type: boolean
                expireAt:
                  type: string
                  format: date-time
                  nullable: true
                dataLimit:
                  type: string
                  nullable: true
      responses:
        "200":
          description: OK
    delete:
      summary: Delete user
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: VLESS/VMess/Trojan UUID of the user
      responses:
        "204":
          description: Deleted
  /users/{uuid}/reset-traffic:
    post:
      summary: Reset user traffic counters
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: VLESS/VMess/Trojan UUID of the user
      responses:
        "200":
          description: Updated user
