openapi: 3.1.0
info:
  title: Super VPN Panel API
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - ApiKeyAuth: []
paths:
  /health:
    get:
      security: []
      summary: Health check
      responses:
        "200":
          description: OK
  /openapi.yaml:
    get:
      security: []
      summary: OpenAPI YAML
      responses:
        "200":
          description: YAML document
  /openapi.json:
    get:
      security: []
      summary: OpenAPI JSON
      responses:
        "200":
          description: OpenAPI object
  /status:
    get:
      summary: Server and Xray status
      description: |
        Загрузка хоста (CPU за короткое окно, память, load average, корневой диск) и доступность Xray API (`listInbounds`).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [uptimeSec, server, xray]
                properties:
                  uptimeSec:
                    type: integer
                    description: Uptime процесса панели в секундах
                  server:
                    type: object
                    required: [cpu, memory, load, disk]
                    properties:
                      cpu:
                        type: object
                        required: [usagePercent]
                        properties:
                          usagePercent:
                            type: integer
                            minimum: 0
                            maximum: 100
                      memory:
                        type: object
                        required: [totalBytes, freeBytes, usedPercent]
                        properties:
                          totalBytes: { type: integer }
                          freeBytes: { type: integer }
                          usedPercent: { type: integer }
                      load:
                        type: object
                        required: [load1, load5, load15, cores]
                        properties:
                          load1: { type: number }
                          load5: { type: number }
                          load15: { type: number }
                          cores: { type: integer }
                      disk:
                        type: object
                        required: [path, totalBytes, freeBytes, usedPercent]
                        properties:
                          path: { type: string }
                          totalBytes: { type: integer }
                          freeBytes: { type: integer }
                          usedPercent: { type: integer }
                  xray:
                    type: object
                    required: [connected]
                    properties:
                      connected: { type: boolean }
                      inboundCount: { type: integer }
                      error: { type: string }
  /inbounds:
    get:
      summary: List inbound tags from running Xray
      description: |
        Inbounds задаются в `config/xray/config.json` вручную; API только читает теги через gRPC.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    tag:
                      type: string
        "502":
          description: Xray gRPC error
        "503":
          description: Xray not configured
  /inbounds/online:
    get:
      summary: Online users per inbound
      description: |
        Возвращает два счётчика по каждому инбаунду:
        `onlineUsers` — текущий online по Xray (`GetAllOnlineUsers` / `GetUsersStats`);
        `activeUsers` — пользователи с трафиком за последнее окно `activeWindowMs` (как в 3x-ui по смыслу).
        Для `onlineUsers` в **рабочем** `config/xray/config.json` в `policy.levels` для уровня клиентов
        (как правило `"0"`) нужны `statsUserOnline` (и блок `"stats": {}`), см. `config/xray/config.example.json`.
        Если `statsUserOnline` выключен, `onlineUsers` будет 0, но `activeUsers` может быть > 0.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [inbounds, activeWindowMs, unmappedOnlineUsers]
                properties:
                  activeWindowMs:
                    type: integer
                    description: Размер окна активности для `activeUsers` в миллисекундах
                  unmappedOnlineUsers:
                    type: integer
                    description: Онлайн в Xray, но id не найден среди пользователей панели
                  inbounds:
                    type: array
                    items:
                      type: object
                      required: [tag, protocol, onlineUsers, activeUsers]
                      properties:
                        tag:
                          type: string
                        protocol:
                          type: string
                        onlineUsers:
                          type: integer
                        activeUsers:
                          type: integer
        "502":
          description: Xray gRPC error
        "503":
          description: Xray not configured
  /users:
    get:
      summary: List users
      parameters:
        - name: inboundTag
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
    post:
      summary: Create user
      description: |
        `inboundTag` должен совпадать с тегом inbound в уже запущенном Xray.
        VLESS-ссылку собирайте у себя по `uuid`, `inboundTag` и настройкам из своего `config.json`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, inboundTag]
              properties:
                name:
                  type: string
                inboundTag:
                  type: string
                enabled:
                  type: boolean
                  default: true
                  description: Whether user is active in Xray on creation
                expireAt:
                  type: string
                  format: date-time
                  nullable: true
                dataLimit:
                  type: string
                  description: Traffic limit in bytes (stringified bigint)
                  nullable: true
      responses:
        "200":
          description: Created user
        "400":
          description: Validation or unknown inboundTag
  /users/{uuid}:
    get:
      summary: Get user
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: VLESS/VMess/Trojan UUID of the user
      responses:
        "200":
          description: OK
    patch:
      summary: Update user
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: VLESS/VMess/Trojan UUID of the user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                enabled:
                  type: boolean
                expireAt:
                  type: string
                  format: date-time
                  nullable: true
                dataLimit:
                  type: string
                  nullable: true
      responses:
        "200":
          description: OK
    delete:
      summary: Delete user
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: VLESS/VMess/Trojan UUID of the user
      responses:
        "204":
          description: Deleted
  /users/{uuid}/reset-traffic:
    post:
      summary: Reset user traffic counters
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: VLESS/VMess/Trojan UUID of the user
      responses:
        "200":
          description: Updated user
