openapi: 3.1.0
info:
  title: Super VPN Panel API
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - ApiKeyAuth: []
paths:
  /health:
    get:
      security: []
      summary: Health check
      responses:
        "200":
          description: OK
  /openapi.yaml:
    get:
      security: []
      summary: OpenAPI YAML
      responses:
        "200":
          description: YAML document
  /openapi.json:
    get:
      security: []
      summary: OpenAPI JSON
      responses:
        "200":
          description: OpenAPI object
  /inbounds:
    get:
      summary: List inbound tags from running Xray
      description: |
        Inbounds задаются в `config/xray/config.json` вручную; API только читает теги через gRPC.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    tag:
                      type: string
        "502":
          description: Xray gRPC error
        "503":
          description: Xray not configured
  /inbounds/online:
    get:
      summary: Online users per inbound
      description: |
        Считает пользователей в статусе online по данным Xray (gRPC), сопоставляя id пользователя панели
        с инбаундом из БД. В **рабочем** `config/xray/config.json` в `policy.levels` для уровня клиентов
        (как правило `"0"`) нужны `statsUserOnline` (и блок `"stats": {}`), см. `config/xray/config.example.json`.
        Без `statsUserOnline` Xray не ведёт online — ответ будет нулевым, даже если VPN подключён.
        Используются только массовые gRPC (`GetAllOnlineUsers`, `GetUsersStats`) — фиксированное число вызовов к Xray, без обхода по каждому пользователю.
        Соединения без записи в панели попадают в `unmappedOnlineUsers`.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [inbounds, unmappedOnlineUsers]
                properties:
                  unmappedOnlineUsers:
                    type: integer
                    description: Онлайн в Xray, но id не найден среди пользователей панели
                  inbounds:
                    type: array
                    items:
                      type: object
                      required: [tag, protocol, onlineUsers]
                      properties:
                        tag:
                          type: string
                        protocol:
                          type: string
                        onlineUsers:
                          type: integer
        "502":
          description: Xray gRPC error
        "503":
          description: Xray not configured
  /users:
    get:
      summary: List users
      parameters:
        - name: inboundTag
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
    post:
      summary: Create user
      description: |
        `inboundTag` должен совпадать с тегом inbound в уже запущенном Xray.
        VLESS-ссылку собирайте у себя по `uuid`, `inboundTag` и настройкам из своего `config.json`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, inboundTag]
              properties:
                name:
                  type: string
                inboundTag:
                  type: string
                enabled:
                  type: boolean
                  default: true
                  description: Whether user is active in Xray on creation
                expireAt:
                  type: string
                  format: date-time
                  nullable: true
                dataLimit:
                  type: string
                  description: Traffic limit in bytes (stringified bigint)
                  nullable: true
      responses:
        "200":
          description: Created user
        "400":
          description: Validation or unknown inboundTag
  /users/{uuid}:
    get:
      summary: Get user
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: VLESS/VMess/Trojan UUID of the user
      responses:
        "200":
          description: OK
    patch:
      summary: Update user
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: VLESS/VMess/Trojan UUID of the user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                enabled:
                  type: boolean
                expireAt:
                  type: string
                  format: date-time
                  nullable: true
                dataLimit:
                  type: string
                  nullable: true
      responses:
        "200":
          description: OK
    delete:
      summary: Delete user
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: VLESS/VMess/Trojan UUID of the user
      responses:
        "204":
          description: Deleted
  /users/{uuid}/reset-traffic:
    post:
      summary: Reset user traffic counters
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: VLESS/VMess/Trojan UUID of the user
      responses:
        "200":
          description: Updated user
